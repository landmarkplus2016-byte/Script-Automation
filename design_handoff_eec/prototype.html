<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ericsson Equipment Configurator — HeroUI Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
/* ============================== Tokens — HeroUI Sky ============================== */
:root {
  --bg-base:        #f4f7fb;
  --bg-panel:       #ffffff;
  --bg-card:        #ffffff;
  --bg-soft:        #eef3fa;
  --bg-code:        #f9fbfd;
  --bg-gutter:      #eef3fa;
  --border:         #e3eaf3;
  --border-strong:  #c8d4e3;
  --text-primary:   #0e1a2b;
  --text-secondary: #3c4d66;
  --text-muted:     #6b7c95;
  --text-dim:       #98a6bb;
  --accent:         #006fee;        /* HeroUI primary blue */
  --accent-strong:  #0058c5;
  --accent-deep:    #00407d;
  --accent-soft:    #e2efff;
  --accent-tint:    #f0f6ff;
  --green:          #17c964;
  --green-soft:     #d8f7e6;
  --amber:          #f5a524;
  --amber-soft:     #fcecd1;
  --red:            #f31260;
  --red-soft:       #ffd8e4;
  --shadow-sm: 0 1px 2px rgba(15,38,71,0.04), 0 1px 3px rgba(15,38,71,0.04);
  --shadow-md: 0 4px 14px rgba(15,38,71,0.06), 0 2px 4px rgba(15,38,71,0.04);
  --shadow-lg: 0 12px 28px rgba(15,38,71,0.10), 0 4px 10px rgba(15,38,71,0.05);
  --shadow-accent: 0 8px 24px rgba(0,111,238,0.28);
  --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', 'Fira Code', ui-monospace, Consolas, monospace;
  --panel-width: 460px;
  --radius-xs: 8px;
  --radius-sm: 12px;
  --radius:    16px;
  --radius-lg: 20px;
  --radius-xl: 24px;
}

*, *::before, *::after { box-sizing: border-box; }
html, body, #root { height: 100%; }
body {
  margin: 0;
  font-family: var(--font-sans);
  font-size: 14px;
  line-height: 1.5;
  color: var(--text-primary);
  background: var(--bg-base);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  letter-spacing: -0.005em;
}
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, select { font-family: inherit; color: inherit; }

/* ============================== Shell ============================== */
.app {
  display: grid;
  grid-template-rows: 64px 1fr;
  height: 100vh;
  overflow: hidden;
  background:
    radial-gradient(800px 400px at 80% -10%, #d4e6ff 0%, transparent 60%),
    radial-gradient(700px 400px at -10% 110%, #e6f0ff 0%, transparent 60%),
    var(--bg-base);
}

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 22px;
  background: rgba(255,255,255,0.7);
  backdrop-filter: saturate(160%) blur(14px);
  -webkit-backdrop-filter: saturate(160%) blur(14px);
  border-bottom: 1px solid var(--border);
}
.brand { display: flex; align-items: center; gap: 12px; }
.brand-mark {
  width: 38px; height: 38px;
  border-radius: 12px;
  background:
    linear-gradient(135deg, #338ef7 0%, #006fee 50%, #0058c5 100%);
  display: grid; place-items: center;
  font-weight: 800;
  color: #fff;
  font-size: 13px;
  letter-spacing: 0.4px;
  box-shadow: 0 6px 16px rgba(0,111,238,0.35), inset 0 1px 0 rgba(255,255,255,0.35);
}
.brand-title {
  font-weight: 700;
  font-size: 15px;
  letter-spacing: -0.01em;
}
.brand-sub {
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.2px;
  font-weight: 500;
}
.topbar-actions { display: flex; align-items: center; gap: 10px; }

.chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  background: var(--green-soft);
  color: #0e7a3c;
  border-radius: 999px;
  font-size: 11.5px;
  font-weight: 600;
  letter-spacing: 0;
}
.chip .dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 0 3px rgba(23,201,100,0.18);
}
.lang-btn {
  padding: 6px 14px;
  background: var(--bg-soft);
  border-radius: 999px;
  color: var(--text-secondary);
  font-size: 11.5px;
  font-weight: 600;
  letter-spacing: 0.3px;
  transition: background .15s;
}
.lang-btn:hover { background: var(--accent-soft); color: var(--accent); }

/* ============================== Layout ============================== */
.layout {
  display: grid;
  grid-template-columns: var(--panel-width) 1fr;
  height: 100%;
  overflow: hidden;
  gap: 14px;
  padding: 14px;
}
.tabs { display: none; }

@media (max-width: 900px) {
  .layout { grid-template-columns: 1fr; grid-template-rows: 44px 1fr; padding: 10px; gap: 10px; }
  .tabs {
    display: flex;
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 4px;
    gap: 4px;
  }
  .tab {
    flex: 1;
    font-size: 12.5px;
    font-weight: 600;
    color: var(--text-muted);
    background: transparent;
    border-radius: 999px;
    padding: 7px 0;
    transition: background .15s, color .15s;
  }
  .tab.active { color: var(--accent); background: var(--accent-soft); }
  .pane-form, .pane-preview { display: none; }
  .pane-form.active, .pane-preview.active { display: flex; }
}

/* ============================== Form panel ============================== */
.pane-form {
  display: flex;
  flex-direction: column;
  background: var(--bg-panel);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-md);
  overflow: hidden;
  border: 1px solid var(--border);
}
.form-scroll {
  overflow-y: auto;
  padding: 22px 20px 28px;
  flex: 1;
}
.section-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin: 0 0 12px;
  display: flex; align-items: center; justify-content: space-between;
}
.section-label .count {
  font-weight: 600;
  color: var(--text-dim);
  letter-spacing: 0.02em;
}

.node-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 6px 16px;
  margin-bottom: 24px;
  box-shadow: var(--shadow-sm);
}
.field {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 14px 0;
}
.field + .field { border-top: 1px solid var(--border); }
.field-label {
  font-size: 13.5px;
  color: var(--text-primary);
  font-weight: 600;
}
.field-help {
  font-size: 11.5px;
  color: var(--text-muted);
  margin-top: 2px;
  font-weight: 500;
}
.text-input {
  background: var(--bg-soft);
  border: 2px solid transparent;
  border-radius: 12px;
  padding: 9px 12px;
  color: var(--text-primary);
  font-family: var(--font-mono);
  font-size: 13.5px;
  font-weight: 600;
  width: 110px;
  text-align: right;
  outline: none;
  transition: background .15s, border-color .15s;
}
.text-input:hover { background: #e6edf6; }
.text-input:focus { background: #fff; border-color: var(--accent); }

/* iOS-style switch */
.switch {
  position: relative;
  width: 44px; height: 26px;
  background: #cfd8e6;
  border-radius: 999px;
  cursor: pointer;
  transition: background .2s ease;
  flex-shrink: 0;
}
.switch::after {
  content: "";
  position: absolute;
  top: 3px; left: 3px;
  width: 20px; height: 20px;
  background: #ffffff;
  border-radius: 50%;
  box-shadow: 0 2px 4px rgba(15,38,71,0.2), 0 1px 1px rgba(15,38,71,0.1);
  transition: transform .22s cubic-bezier(.34,1.4,.46,.95);
}
.switch.on { background: var(--accent); }
.switch.on::after { transform: translateX(18px); }

/* ============================== Band cards ============================== */
.band-list { display: flex; flex-direction: column; gap: 14px; }

.band-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  transition: box-shadow .18s, transform .18s;
}
.band-card:hover {
  box-shadow: var(--shadow-md);
  transform: translateY(-1px);
}
.band-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px 10px;
}
.band-title { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.band-name {
  font-family: var(--font-mono);
  font-weight: 700;
  font-size: 15px;
  letter-spacing: 0.3px;
  color: var(--text-primary);
}
.band-name-input {
  background: var(--bg-soft);
  border: 2px solid transparent;
  border-radius: 10px;
  padding: 4px 10px;
  color: var(--text-primary);
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 600;
  width: 110px;
  outline: none;
}
.band-name-input:focus { background: #fff; border-color: var(--accent); }

.badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 9px;
  border-radius: 999px;
  font-size: 10.5px;
  font-weight: 700;
  letter-spacing: 0.3px;
}
.badge.unlocked { background: var(--green-soft); color: #0e7a3c; }
.badge.locked   { background: var(--red-soft); color: #b3023f; }
.badge.rftype   { background: var(--accent-soft); color: var(--accent-strong); }
.badge .dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

.icon-btn {
  width: 30px; height: 30px;
  border-radius: 10px;
  color: var(--text-muted);
  display: grid; place-items: center;
  transition: background .15s, color .15s;
  flex-shrink: 0;
}
.icon-btn:hover { background: var(--red-soft); color: var(--red); }

.band-body {
  padding: 4px 16px 16px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 8px 0;
}
.row + .row { border-top: 1px solid #f0f3f8; }
.row-label {
  font-size: 12.5px;
  color: var(--text-secondary);
  font-weight: 600;
  flex-shrink: 0;
}

/* Slider */
.slider-wrap { display: flex; align-items: center; gap: 12px; flex: 1; }
.slider {
  -webkit-appearance: none;
  appearance: none;
  flex: 1;
  height: 6px;
  background: linear-gradient(to right, var(--accent) var(--pct,40%), #dbe4f0 var(--pct,40%));
  border-radius: 999px;
  outline: none;
}
.slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 20px; height: 20px;
  background: #fff;
  border: 2px solid var(--accent);
  border-radius: 50%;
  cursor: grab;
  box-shadow: 0 2px 6px rgba(0,111,238,0.35);
  transition: transform .15s;
}
.slider::-webkit-slider-thumb:hover { transform: scale(1.1); }
.slider::-moz-range-thumb {
  width: 20px; height: 20px;
  background: #fff;
  border: 2px solid var(--accent);
  border-radius: 50%;
  cursor: grab;
}
.slider-value {
  min-width: 28px;
  text-align: center;
  font-family: var(--font-mono);
  font-weight: 700;
  font-size: 13px;
  color: var(--accent);
  background: var(--accent-soft);
  border-radius: 8px;
  padding: 3px 8px;
}

/* Segmented control — pill style */
.segment {
  display: inline-flex;
  background: var(--bg-soft);
  border-radius: 999px;
  padding: 3px;
  gap: 2px;
}
.segment button {
  padding: 5px 13px;
  font-size: 11.5px;
  font-weight: 700;
  letter-spacing: 0.3px;
  border-radius: 999px;
  color: var(--text-muted);
  transition: background .18s, color .18s, box-shadow .18s;
  font-family: var(--font-mono);
}
.segment button:hover { color: var(--text-secondary); }
.segment button.active {
  background: #fff;
  color: var(--accent);
  box-shadow: var(--shadow-sm);
}
.segment.state button.active.unlocked { background: var(--green); color: #fff; box-shadow: 0 2px 6px rgba(23,201,100,0.4); }
.segment.state button.active.locked { background: var(--red); color: #fff; box-shadow: 0 2px 6px rgba(243,18,96,0.4); }

.checkbox-row {
  display: flex; align-items: center; gap: 9px;
  font-size: 12.5px; color: var(--text-secondary); font-weight: 600;
  cursor: pointer;
  user-select: none;
}
.checkbox {
  width: 18px; height: 18px;
  border: 2px solid #c8d4e3;
  border-radius: 6px;
  display: grid; place-items: center;
  background: #fff;
  transition: background .15s, border-color .15s;
}
.checkbox.on { background: var(--accent); border-color: var(--accent); }
.checkbox.on::after {
  content: "";
  width: 5px; height: 9px;
  border: solid #fff;
  border-width: 0 2px 2px 0;
  transform: rotate(45deg) translate(-1px, -1px);
}

.tilt-input {
  background: var(--bg-soft);
  border: 2px solid transparent;
  border-radius: 10px;
  padding: 5px 10px;
  color: var(--text-primary);
  font-family: var(--font-mono);
  font-size: 12.5px;
  font-weight: 600;
  width: 64px;
  text-align: center;
  outline: none;
}
.tilt-input:focus { background: #fff; border-color: var(--accent); }

/* Add band buttons */
.add-section { margin-top: 22px; }
.add-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.add-btn {
  display: flex; align-items: center; justify-content: center; gap: 7px;
  padding: 11px 12px;
  background: #fff;
  border: 1.5px solid var(--border);
  border-radius: 14px;
  color: var(--text-secondary);
  font-size: 12.5px;
  font-weight: 700;
  font-family: var(--font-mono);
  letter-spacing: 0.3px;
  transition: background .15s, border-color .15s, color .15s, transform .1s;
}
.add-btn:hover {
  background: var(--accent-tint);
  border-color: var(--accent);
  color: var(--accent);
}
.add-btn:active { transform: scale(0.98); }
.add-btn.custom { grid-column: span 2; }
.add-btn .plus {
  width: 18px; height: 18px;
  display: grid; place-items: center;
  background: var(--accent);
  color: #fff;
  border-radius: 6px;
  font-size: 14px;
  font-weight: 700;
  line-height: 1;
}

.warning-banner {
  margin-top: 16px;
  padding: 12px 14px;
  background: var(--amber-soft);
  border-radius: var(--radius-sm);
  display: flex; gap: 10px; align-items: center;
  font-size: 12.5px;
  color: #7a4f00;
  font-weight: 600;
}
.warning-banner svg { flex-shrink: 0; color: var(--amber); }

/* ============================== Preview panel ============================== */
.pane-preview {
  display: flex;
  flex-direction: column;
  background: var(--bg-panel);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-md);
  overflow: hidden;
  min-width: 0;
  border: 1px solid var(--border);
}
.preview-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.preview-file {
  display: flex; align-items: center; gap: 10px;
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 600;
}
.preview-file .filename { color: var(--text-primary); }
.preview-meta { display: flex; gap: 8px; }
.meta-chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 11px;
  background: var(--bg-soft);
  border-radius: 999px;
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
}
.meta-chip strong { color: var(--text-primary); font-weight: 700; }

.preview-body {
  display: flex;
  flex: 1;
  overflow: auto;
  background: var(--bg-code);
  position: relative;
}
.gutter {
  padding: 16px 12px 16px 16px;
  font-family: var(--font-mono);
  font-size: 12px;
  line-height: 1.6;
  color: var(--text-dim);
  text-align: right;
  user-select: none;
  background: var(--bg-gutter);
  white-space: pre;
  flex-shrink: 0;
}
.code {
  padding: 16px 20px;
  font-family: var(--font-mono);
  font-size: 12px;
  line-height: 1.6;
  color: var(--text-secondary);
  white-space: pre;
  flex: 1;
  min-width: 0;
  margin: 0;
}
.code .tag-open { color: #006fee; }
.code .tag-close { color: #f31260; }
.code .attr { color: #7828c8; }
.code .value { color: #0e7a3c; }
.code .delim { color: #c25c00; font-weight: 700; }
.code .text-content { color: #0e1a2b; font-weight: 600; }
.code .comment { color: #98a6bb; font-style: italic; }
.code .decl { color: #7828c8; }

.preview-footer {
  display: flex;
  gap: 10px;
  padding: 14px 20px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 11px 18px;
  border-radius: 14px;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0;
  transition: background .15s, color .15s, transform .08s, box-shadow .15s;
}
.btn:active { transform: translateY(1px); }
.btn-primary {
  background: var(--accent);
  color: #fff;
  flex: 1;
  box-shadow: var(--shadow-accent);
}
.btn-primary:hover { background: var(--accent-strong); }
.btn-secondary {
  background: var(--bg-soft);
  color: var(--text-primary);
  flex: 1;
}
.btn-secondary:hover { background: #e0e8f1; }
.btn .ok { color: var(--green); font-weight: 700; }

/* Scrollbars */
.form-scroll::-webkit-scrollbar, .preview-body::-webkit-scrollbar { width: 10px; height: 10px; }
.form-scroll::-webkit-scrollbar-track, .preview-body::-webkit-scrollbar-track { background: transparent; }
.form-scroll::-webkit-scrollbar-thumb, .preview-body::-webkit-scrollbar-thumb {
  background: #d2dbe7;
  border-radius: 999px;
  border: 2px solid transparent;
  background-clip: padding-box;
}
.form-scroll::-webkit-scrollbar-thumb:hover, .preview-body::-webkit-scrollbar-thumb:hover { background-color: #b2bfd1; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>

<script type="text/babel" data-presets="env,react">
const { useState, useMemo } = React;

const PORT_SEQUENCE = ['A','B','C','D','E','F','G','H','J','K','L','M','N','P','Q','R','S','T','U','V','W','X','Y','Z'];
const RF_PORTS = { '4T4R': ['A','B','C','D'], '2T2R': ['A','B'] };
const BAND_PRESETS = {
  '44XX': { rfType:'4T4R', sectorAdminState:'UNLOCKED', rfPortAdminState:'LOCKED',  mixedModeRadio:false, hasMechanicalTilt:true },
  '0900': { rfType:'2T2R', sectorAdminState:'LOCKED',   rfPortAdminState:'UNLOCKED', mixedModeRadio:true,  hasMechanicalTilt:false },
  '1800': { rfType:'2T2R', sectorAdminState:'LOCKED',   rfPortAdminState:'UNLOCKED', mixedModeRadio:true,  hasMechanicalTilt:false },
  '2100': { rfType:'2T2R', sectorAdminState:'LOCKED',   rfPortAdminState:'UNLOCKED', mixedModeRadio:true,  hasMechanicalTilt:false }
};
const PRESET_KEYS = ['44XX','0900','1800','2100'];

function getEffectivePreset(band) {
  const base = BAND_PRESETS[band.prefix] || {
    rfType: '2T2R', sectorAdminState: 'UNLOCKED', rfPortAdminState: 'UNLOCKED',
    mixedModeRadio: false, hasMechanicalTilt: false
  };
  return {
    rfType: band.rfTypeOverride || base.rfType,
    sectorAdminState: band.adminStateOverride || base.sectorAdminState,
    rfPortAdminState: base.rfPortAdminState,
    mixedModeRadio: band.mixedModeOverride !== null ? band.mixedModeOverride : base.mixedModeRadio,
    hasMechanicalTilt: base.hasMechanicalTilt || band.rfTypeOverride === '4T4R'
  };
}
function allocatePorts(bands) {
  const out = []; let i = 0;
  for (const b of bands) {
    const prefix = b.prefix === 'CUSTOM' ? (b.customPrefix || 'CSTM') : b.prefix;
    for (let s = 1; s <= b.numSectors; s++) {
      out.push({ bandPrefix: prefix, sectorNum: s, bbuPort: PORT_SEQUENCE[i] || '?' });
      i++;
    }
  }
  return out;
}

function generateXML(state) {

      lines.push(`              <AntennaSubunit>`);
      lines.push(`                <antennaSubunitId>1</antennaSubunitId>`);
      ports.forEach((p, idx) => lines.push(`                <AuPort><auPortId>${idx+1}</auPortId></AuPort>`));
      lines.push(`              </AntennaSubunit>`);
      lines.push(`            </AntennaUnit>`);
      lines.push(`          </AntennaUnitGroup>`);
      ports.forEach((p, idx) => {
        lines.push(`          <FieldReplaceableUnit>`);
        lines.push(`            <fieldReplaceableUnitId>${fruId}</fieldReplaceableUnitId>`);

        lines.push(`            <RfPort>`);
        lines.push(`              <rfPortId>${p}</rfPortId>`);
        lines.push(`              <administrativeState>${eff.rfPortAdminState}</administrativeState>`);
        lines.push(`            </RfPort>`);
        lines.push(`          </FieldReplaceableUnit>`);
        lines.push(`          <AntennaUnitGroup>`);
        lines.push(`            <antennaUnitGroupId>${groupId}</antennaUnitGroupId>`);
        lines.push(`            <RfBranch>`);
        lines.push(`              <rfBranchId>${idx+1}</rfBranchId>`);
        lines.push(`              <auPortRef>${baseRef},AntennaUnitGroup=${groupId},AntennaUnit=1,AntennaSubunit=1,AuPort=${idx+1}</auPortRef>`);
        lines.push(`              <rfPortRef>${baseRef},FieldReplaceableUnit=${fruId},RfPort=${p}</rfPortRef>`);
        lines.push(`            </RfBranch>`);
        lines.push(`          </AntennaUnitGroup>`);
      });
    }
  }
  lines.push(``);
  lines.push(`          <Cabinet><cabinetId>1</cabinetId></Cabinet>`);
  lines.push(``);
  lines.push(`          <FieldReplaceableUnit>`);
  lines.push(`            <fieldReplaceableUnitId>1</fieldReplaceableUnitId>`);
  lines.push(`            <administrativeState>UNLOCKED</administrativeState>`);
  allocated.forEach(a => lines.push(`            <RiPort><riPortId>${a.bbuPort}</riPortId></RiPort>`));
  lines.push(`            <SyncPort><syncPortId>1</syncPortId></SyncPort>`);
  lines.push(`          </FieldReplaceableUnit>`);
  for (const band of state.bands) {
    const prefix = band.prefix === 'CUSTOM' ? (band.customPrefix || 'CSTM') : band.prefix;
    for (let s = 1; s <= band.numSectors; s++) {

      lines.push(`          <FieldReplaceableUnit>`);
      lines.push(`            <fieldReplaceableUnitId>${fruId}</fieldReplaceableUnitId>`);
      lines.push(`            <RiPort><riPortId>DATA_1</riPortId></RiPort>`);
      lines.push(`            <RiPort><riPortId>DATA_2</riPortId></RiPort>`);
      lines.push(`          </FieldReplaceableUnit>`);
    }
  }
  lines.push(``);
  let ai = 0;
  for (const band of state.bands) {
    const prefix = band.prefix === 'CUSTOM' ? (band.customPrefix || 'CSTM') : band.prefix;
    for (let s = 1; s <= band.numSectors; s++) {
      const linkId = `${prefix}_S${s}_1st`;
      const fruId = `${prefix}-${s}-RRUW-1`;
      const bbuPort = allocated[ai]?.bbuPort || '?'; ai++;
      lines.push(`          <RiLink>`);
      lines.push(`            <riLinkId>${linkId}</riLinkId>`);
      lines.push(`            <riPortRef1>${baseRef},FieldReplaceableUnit=1,RiPort=${bbuPort}</riPortRef1>`);
      lines.push(`            <riPortRef2>${baseRef},FieldReplaceableUnit=${fruId},RiPort=DATA_2</riPortRef2>`);
      lines.push(`          </RiLink>`);
    }
  }
  lines.push(`        </Equipment>`);
  lines.push(`        <EquipmentSupportFunction>`);
  lines.push(`          <equipmentSupportFunctionId>1</equipmentSupportFunctionId>`);
  lines.push(`          <supportSystemControl>${state.supportSystemControl ? 'true' : 'false'}</supportSystemControl>`);
  lines.push(`        </EquipmentSupportFunction>`);
  lines.push(`        <NodeSupport xmlns="urn:com:ericsson:ecim:RcsNodeSupport">`);
  lines.push(`          <nodeSupportId>1</nodeSupportId>`);
  lines.push(`          <MpClusterHandling>`);
  lines.push(`            <mpClusterHandlingId>1</mpClusterHandlingId>`);
  lines.push(`            <primaryCoreRef>${baseRef},FieldReplaceableUnit=1</primaryCoreRef>`);
  lines.push(`          </MpClusterHandling>`);
  for (const band of state.bands) {
    const prefix = band.prefix === 'CUSTOM' ? (band.customPrefix || 'CSTM') : band.prefix;
    const eff = getEffectivePreset(band);
    const ports = RF_PORTS[eff.rfType];
    for (let s = 1; s <= band.numSectors; s++) {
      const groupId = `${prefix}_S${s}`;
      lines.push(`          <SectorEquipmentFunction>`);
      lines.push(`            <sectorEquipmentFunctionId>${groupId}</sectorEquipmentFunctionId>`);
      lines.push(`            <administrativeState>${eff.sectorAdminState}</administrativeState>`);
      if (eff.mixedModeRadio) lines.push(`            <mixedModeRadio>true</mixedModeRadio>`);
      ports.forEach((p, idx) => lines.push(`            <rfBranchRef>${baseRef},AntennaUnitGroup=${groupId},RfBranch=${idx+1}</rfBranchRef>`));
      lines.push(`          </SectorEquipmentFunction>`);
    }
  }
  lines.push(`        </NodeSupport>`);
  lines.push(`      </ManagedElement>`);
  lines.push(`    </config>`);
  lines.push(`  </edit-config>`);
  lines.push(`</rpc>`);
  lines.push(`]]>]]>`);
  lines.push(`<rpc message-id="2" xmlns="urn:ietf:params:xml:ns:netconf:base:1.0">`);
  lines.push(`  <close-session/>`);
  lines.push(`</rpc>`);
  lines.push(`]]>]]>`);
  return lines.join('\n');
}

function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function highlightXML(xml) {
  return xml.split('\n').map(line => {
    if (line.trim().startsWith('<!--')) return `<span class="comment">${escapeHtml(line)}</span>`;
    if (line.trim() === ']]>]]>') return `<span class="delim">${escapeHtml(line)}</span>`;
    if (line.trim().startsWith('<?xml')) return `<span class="decl">${escapeHtml(line)}</span>`;
    let out = escapeHtml(line);
    out = out.replace(/(&gt;)([^&<>]+?)(&lt;)/g, (m, a, txt, b) => /^\s*$/.test(txt) ? m : `${a}<span class="text-content">${txt}</span>${b}`);
    out = out.replace(/(&lt;\/)([A-Za-z_][\w:-]*)(&gt;)/g, '<span class="tag-close">$1$2$3</span>');
    out = out.replace(/(&lt;)([A-Za-z_][\w:-]*)([^&]*?)(\/?&gt;)/g, (m, lt, name, attrs, gt) => {
      const styledAttrs = attrs.replace(/([\w:-]+)=(&quot;)([^"]*?)(&quot;)/g, '<span class="attr">$1</span>=$2<span class="value">$3</span>$4');
      return `<span class="tag-open">${lt}${name}</span>${styledAttrs}<span class="tag-open">${gt}</span>`;
    });
    return out;
  }).join('\n');
}

function Switch({ on, onChange }) {
  return <div className={`switch ${on ? 'on' : ''}`} role="switch" aria-checked={on} onClick={() => onChange(!on)} />;
}
function Checkbox({ on, onChange, label }) {
  return (
    <div className="checkbox-row" onClick={() => onChange(!on)}>
      <div className={`checkbox ${on ? 'on' : ''}`} />
      <span>{label}</span>

  );
}
function Segment({ options, value, onChange, variant }) {
  return (
    <div className={`segment ${variant || ''}`}>
      {options.map(o => (
        <button key={o} className={`${value === o ? 'active' : ''} ${o.toLowerCase()}`} onClick={() => onChange(o)}>{o}</button>
      ))}
    </div>
  );
}

          <div className="preview-header">
            <div className="preview-file">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" strokeWidth="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
              <span className="filename">SiteEquipment_{state.nodeId}.xml</span>
            </div>
            <div className="preview-meta">
              <span className="meta-chip">lines<strong>{lineCount}</strong></span>
              <span className="meta-chip">bytes<strong>{xml.length.toLocaleString()}</strong></span>
            </div>
          </div>

          <div className="preview-body">
            <div className="gutter">{lineNumbers}</div>
            <pre className="code" dangerouslySetInnerHTML={{__html: highlighted}} />
          </div>

          <div className="preview-footer">
            <button className="btn btn-secondary" onClick={onCopy}>
              {copyOk ? (<><span className="ok">✓</span><span className="ok">Copied</span></>) :
                (<><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>Copy XML</>)}
            </button>
            <button className="btn btn-primary" onClick={onDownload}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              Download .xml
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
