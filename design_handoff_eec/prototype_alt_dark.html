<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ericsson Equipment Configurator — Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
/* ============================== Tokens — light navy ============================== */
:root {
  --bg-base:        #eef3fb;   /* page */
  --bg-panel:       #f7faff;   /* side panel */
  --bg-card:        #ffffff;   /* cards */
  --bg-card-2:      #f1f5fc;   /* hover */
  --bg-code:        #f8fbff;   /* preview body */
  --bg-gutter:      #eaf0f9;
  --border:         #d6e0ee;
  --border-strong:  #b8c7dd;
  --text-primary:   #0f2647;   /* deep navy */
  --text-secondary: #314969;
  --text-muted:     #5b7090;
  --text-dim:       #8597b1;
  --accent:         #2563eb;
  --accent-strong:  #1d4ed8;
  --accent-deep:    #15326b;
  --accent-soft:    rgba(37,99,235,0.10);
  --green:          #15803d;
  --green-soft:     rgba(21,128,61,0.10);
  --amber:          #b45309;
  --amber-soft:     rgba(180,83,9,0.10);
  --red:            #b91c1c;
  --red-soft:       rgba(185,28,28,0.10);
  --purple:         #6d28d9;
  --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', 'Fira Code', ui-monospace, Consolas, monospace;
  --panel-width: 440px;
  --radius: 10px;
  --radius-sm: 6px;
}

/* ============================== Reset ============================== */
*, *::before, *::after { box-sizing: border-box; }
html, body, #root { height: 100%; }
body {
  margin: 0;
  font-family: var(--font-sans);
  font-size: 14px;
  line-height: 1.5;
  color: var(--text-primary);
  background: var(--bg-base);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, select { font-family: inherit; }

/* ============================== App shell ============================== */
.app {
  display: grid;
  grid-template-rows: 56px 1fr;
  height: 100vh;
  overflow: hidden;
}

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  background: linear-gradient(180deg, #ffffff 0%, #f4f8fd 100%);
  border-bottom: 1px solid var(--border);
}
.brand {
  display: flex;
  align-items: center;
  gap: 12px;
}
.brand-mark {
  width: 32px; height: 32px;
  border-radius: 8px;
  background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
  display: grid; place-items: center;
  font-weight: 700;
  letter-spacing: 0.5px;
  color: #fff;
  font-size: 13px;
  box-shadow: 0 2px 6px rgba(29,78,216,0.4), inset 0 1px 0 rgba(255,255,255,0.18);
}
.brand-title {
  font-weight: 600;
  font-size: 14px;
  letter-spacing: 0.1px;
}
.brand-sub {
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.4px;
}
.topbar-actions {
  display: flex;
  align-items: center;
  gap: 10px;
}
.status-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 10px;
  background: var(--green-soft);
  color: var(--green);
  border-radius: 999px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.3px;
}
.status-pill .dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--green);
}
.lang-btn {
  padding: 5px 10px;
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text-secondary);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.5px;
}

/* ============================== Layout ============================== */
.layout {
  display: grid;
  grid-template-columns: var(--panel-width) 1fr;
  height: 100%;
  overflow: hidden;
}
.tabs { display: none; }

@media (max-width: 860px) {
  .layout { grid-template-columns: 1fr; grid-template-rows: 44px 1fr; }
  .tabs {
    display: flex;
    background: var(--bg-panel);
    border-bottom: 1px solid var(--border);
    padding: 0 12px;
    gap: 4px;
  }
  .tab {
    flex: 1;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.4px;
    color: var(--text-muted);
    background: transparent;
    border-bottom: 2px solid transparent;
    padding: 12px 0;
  }
  .tab.active { color: var(--text-primary); border-bottom-color: var(--accent); }
  .pane-form, .pane-preview { display: none; }
  .pane-form.active, .pane-preview.active { display: flex; }
}

/* ============================== Form panel ============================== */
.pane-form {
  display: flex;
  flex-direction: column;
  background: var(--bg-panel);
  border-right: 1px solid var(--border);
  overflow: hidden;
}
.form-scroll {
  overflow-y: auto;
  padding: 20px 18px 24px;
  flex: 1;
}
.section-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: var(--text-muted);
  margin: 0 0 10px;
  display: flex; align-items: center; justify-content: space-between;
}
.section-label .count {
  font-weight: 500;
  color: var(--text-dim);
  letter-spacing: 0.4px;
}

.node-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 22px;
}
.field {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.field + .field { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
.field-label {
  font-size: 12px;
  color: var(--text-secondary);
  font-weight: 500;
}
.field-help {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 2px;
}
.text-input {
  background: #ffffff;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 7px 10px;
  color: var(--text-primary);
  font-family: var(--font-mono);
  font-size: 13px;
  width: 100px;
  text-align: right;
  outline: none;
  transition: border-color .15s, box-shadow .15s;
}
.text-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }

/* Toggle switch */
.switch {
  position: relative;
  width: 36px; height: 20px;
  background: #dde6f3;
  border: 1px solid var(--border);
  border-radius: 999px;
  cursor: pointer;
  transition: background .15s, border-color .15s;
  flex-shrink: 0;
}
.switch::after {
  content: "";
  position: absolute;
  top: 2px; left: 2px;
  width: 14px; height: 14px;
  background: #ffffff;
  border-radius: 50%;
  box-shadow: 0 1px 3px rgba(15,38,71,0.25);
  transition: transform .18s ease;
}
.switch.on { background: var(--accent); border-color: var(--accent); }
.switch.on::after { transform: translateX(16px); }

/* Band cards */
.band-list { display: flex; flex-direction: column; gap: 12px; }

.band-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: border-color .15s;
}
.band-card:hover { border-color: var(--border-strong); }
.band-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 12px;
  background: linear-gradient(180deg, #f0f5fc 0%, #e8eff9 100%);
  border-bottom: 1px solid var(--border);
}
.band-title {
  display: flex; align-items: center; gap: 10px;
}
.band-name {
  font-family: var(--font-mono);
  font-weight: 600;
  font-size: 13px;
  letter-spacing: 0.5px;
}
.band-name-input {
  background: #ffffff;
  border: 1px solid var(--border);
  border-radius: 5px;
  padding: 3px 8px;
  color: var(--text-primary);
  font-family: var(--font-mono);
  font-size: 12px;
  width: 100px;
  outline: none;
}
.badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 8px;
  border-radius: 999px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.5px;
}
.badge.unlocked { background: var(--green-soft); color: var(--green); }
.badge.locked   { background: var(--amber-soft); color: var(--amber); }
.badge .dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

.icon-btn {
  width: 24px; height: 24px;
  border-radius: 6px;
  color: var(--text-muted);
  display: grid; place-items: center;
  transition: background .15s, color .15s;
}
.icon-btn:hover { background: var(--red-soft); color: var(--red); }

.band-body { padding: 12px; display: flex; flex-direction: column; gap: 12px; }

.row {
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
}
.row-label {
  font-size: 11px;
  color: var(--text-muted);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  flex-shrink: 0;
}

/* Slider */
.slider-wrap {
  display: flex; align-items: center; gap: 10px; flex: 1;
}
.slider {
  -webkit-appearance: none;
  appearance: none;
  flex: 1;
  height: 4px;
  background: linear-gradient(to right, var(--accent) var(--pct,40%), #d6e0ee var(--pct,40%));
  border-radius: 4px;
  outline: none;
}
.slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 16px; height: 16px;
  background: #fff;
  border: 2px solid var(--accent);
  border-radius: 50%;
  cursor: grab;
  box-shadow: 0 1px 3px rgba(15,38,71,0.25);
}
.slider::-moz-range-thumb {
  width: 16px; height: 16px;
  background: #fff;
  border: 2px solid var(--accent);
  border-radius: 50%;
  cursor: grab;
}
.slider-value {
  min-width: 24px;
  text-align: center;
  font-family: var(--font-mono);
  font-weight: 600;
  font-size: 13px;
  color: var(--text-primary);
  background: #ffffff;
  border: 1px solid var(--border);
  border-radius: 5px;
  padding: 2px 6px;
}

/* Segmented control */
.segment {
  display: inline-flex;
  background: #eaf0f9;
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 2px;
  gap: 2px;
}
.segment button {
  padding: 4px 10px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.4px;
  border-radius: 5px;
  color: var(--text-muted);
  transition: background .15s, color .15s;
  font-family: var(--font-mono);
}
.segment button.active {
  background: var(--accent-strong);
  color: #fff;
  box-shadow: 0 1px 2px rgba(21,50,107,0.2);
}
.segment.state button.active.unlocked { background: #15803d; color: #fff; }
.segment.state button.active.locked { background: #b45309; color: #fff; }

.checkbox-row {
  display: flex; align-items: center; gap: 8px;
  font-size: 12px; color: var(--text-secondary);
}
.checkbox {
  width: 16px; height: 16px;
  border: 1.5px solid var(--border-strong);
  border-radius: 4px;
  display: grid; place-items: center;
  cursor: pointer;
  background: #ffffff;
  transition: background .15s, border-color .15s;
}
.checkbox.on { background: var(--accent); border-color: var(--accent); }
.checkbox.on::after {
  content: "";
  width: 4px; height: 8px;
  border: solid #fff;
  border-width: 0 2px 2px 0;
  transform: rotate(45deg) translate(-1px, -1px);
}

.tilt-input {
  background: #ffffff;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 4px 8px;
  color: var(--text-primary);
  font-family: var(--font-mono);
  font-size: 12px;
  width: 60px;
  text-align: center;
  outline: none;
}
.tilt-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }

/* Add band buttons */
.add-section { margin-top: 18px; }
.add-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.add-btn {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  padding: 9px 10px;
  background: var(--bg-card);
  border: 1px dashed var(--border-strong);
  border-radius: 7px;
  color: var(--text-secondary);
  font-size: 12px;
  font-weight: 500;
  font-family: var(--font-mono);
  letter-spacing: 0.4px;
  transition: background .15s, border-color .15s, color .15s;
}
.add-btn:hover {
  background: var(--accent-soft);
  border-color: var(--accent);
  border-style: solid;
  color: var(--text-primary);
}
.add-btn.custom {
  grid-column: span 2;
  border-style: solid;
  border-color: var(--border);
}
.add-btn .plus {
  width: 14px; height: 14px;
  display: grid; place-items: center;
  background: var(--accent-strong);
  color: #fff;
  border-radius: 4px;
  font-size: 13px;
  font-weight: 700;
  line-height: 1;
}

.warning-banner {
  margin-top: 14px;
  padding: 10px 12px;
  background: var(--amber-soft);
  border: 1px solid rgba(245,158,11,0.4);
  border-radius: var(--radius-sm);
  display: flex; gap: 10px;
  font-size: 12px;
  color: #fcd34d;
}
.warning-banner svg { flex-shrink: 0; margin-top: 1px; }

/* ============================== Preview panel ============================== */
.pane-preview {
  display: flex;
  flex-direction: column;
  background: var(--bg-code);
  overflow: hidden;
  min-width: 0;
}
.preview-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 18px;
  background: var(--bg-panel);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.preview-file {
  display: flex; align-items: center; gap: 10px;
  font-family: var(--font-mono);
  font-size: 12px;
}
.preview-file .filename { color: var(--text-primary); font-weight: 500; }
.preview-meta {
  display: flex; gap: 12px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-muted);
}
.preview-meta span strong {
  color: var(--text-secondary);
  font-weight: 500;
  margin-left: 4px;
}

.preview-body {
  display: flex;
  flex: 1;
  overflow: auto;
  position: relative;
}
.gutter {
  padding: 14px 10px 14px 14px;
  font-family: var(--font-mono);
  font-size: 12px;
  line-height: 1.55;
  color: var(--text-dim);
  text-align: right;
  user-select: none;
  background: var(--bg-gutter);
  border-right: 1px solid var(--border);
  white-space: pre;
  flex-shrink: 0;
}
.code {
  padding: 14px 18px;
  font-family: var(--font-mono);
  font-size: 12px;
  line-height: 1.55;
  color: var(--text-secondary);
  white-space: pre;
  flex: 1;
  min-width: 0;
}
.code .tag-open { color: #1d4ed8; }
.code .tag-close { color: #b91c1c; }
.code .attr { color: #6d28d9; }
.code .value { color: #047857; }
.code .delim { color: #b45309; font-weight: 600; }
.code .text-content { color: #0f2647; font-weight: 500; }
.code .comment { color: #94a3b8; font-style: italic; }
.code .decl { color: #7c3aed; }

.preview-footer {
  display: flex;
  gap: 10px;
  padding: 12px 18px;
  border-top: 1px solid var(--border);
  background: var(--bg-panel);
  flex-shrink: 0;
}
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 9px 16px;
  border-radius: 7px;
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.2px;
  transition: background .15s, color .15s, transform .05s;
}
.btn:active { transform: translateY(1px); }
.btn-primary {
  background: var(--accent-strong);
  color: #fff;
  flex: 1;
}
.btn-primary:hover { background: #1e40af; }
.btn-secondary {
  background: #ffffff;
  color: var(--text-secondary);
  border: 1px solid var(--border-strong);
  flex: 1;
}
.btn-secondary:hover { background: var(--bg-card-2); color: var(--text-primary); border-color: var(--accent); }
.btn .ok {
  color: var(--green);
  font-weight: 600;
}

/* Scrollbars */
.form-scroll::-webkit-scrollbar, .preview-body::-webkit-scrollbar { width: 10px; height: 10px; }
.form-scroll::-webkit-scrollbar-track, .preview-body::-webkit-scrollbar-track { background: transparent; }
.form-scroll::-webkit-scrollbar-thumb, .preview-body::-webkit-scrollbar-thumb {
  background: #c5d1e4;
  border-radius: 6px;
  border: 2px solid var(--bg-panel);
}
.form-scroll::-webkit-scrollbar-thumb:hover, .preview-body::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
</style>
</head>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="env,react">
const { useState, useMemo, useRef, useEffect } = React;

/* ============================== Config ============================== */
const PORT_SEQUENCE = ['A','B','C','D','E','F','G','H','J','K','L','M','N','P','Q','R','S','T','U','V','W','X','Y','Z'];
const RF_PORTS = { '4T4R': ['A','B','C','D'], '2T2R': ['A','B'] };

const BAND_PRESETS = {
  '44XX': { rfType:'4T4R', sectorAdminState:'UNLOCKED', rfPortAdminState:'LOCKED',  mixedModeRadio:false, hasMechanicalTilt:true },
  '0900': { rfType:'2T2R', sectorAdminState:'LOCKED',   rfPortAdminState:'UNLOCKED', mixedModeRadio:true,  hasMechanicalTilt:false },
  '1800': { rfType:'2T2R', sectorAdminState:'LOCKED',   rfPortAdminState:'UNLOCKED', mixedModeRadio:true,  hasMechanicalTilt:false },
  '2100': { rfType:'2T2R', sectorAdminState:'LOCKED',   rfPortAdminState:'UNLOCKED', mixedModeRadio:true,  hasMechanicalTilt:false }
};

const PRESET_KEYS = ['44XX','0900','1800','2100'];

function getEffectivePreset(band) {
  const base = BAND_PRESETS[band.prefix] || {
    rfType: '2T2R', sectorAdminState: 'UNLOCKED', rfPortAdminState: 'UNLOCKED',
    mixedModeRadio: false, hasMechanicalTilt: false
  };
  return {
    rfType: band.rfTypeOverride || base.rfType,
    sectorAdminState: band.adminStateOverride || base.sectorAdminState,
    rfPortAdminState: base.rfPortAdminState,
    mixedModeRadio: band.mixedModeOverride !== null ? band.mixedModeOverride : base.mixedModeRadio,
    hasMechanicalTilt: base.hasMechanicalTilt || band.rfTypeOverride === '4T4R'
  };
}

function allocatePorts(bands) {
  const out = [];
  let i = 0;
  for (const b of bands) {
    const prefix = b.prefix === 'CUSTOM' ? (b.customPrefix || 'CSTM') : b.prefix;
    for (let s = 1; s <= b.numSectors; s++) {
      out.push({ bandPrefix: prefix, sectorNum: s, bbuPort: PORT_SEQUENCE[i] || '?' });
      i++;
    }
  }
  return out;
}

/* ============================== XML Generator (representative) ============================== */
function generateXML(state) {
  const lines = [];
  const nodeId = state.nodeId;
  const baseRef = `ManagedElement=${nodeId},Equipment=1`;

  lines.push(`<?xml version="1.0" encoding="UTF-8"?>`);
  lines.push(`<hello xmlns="urn:ietf:params:xml:ns:netconf:base:1.0">`);
  lines.push(`  <capabilities>`);
  lines.push(`    <capability>urn:ietf:params:netconf:base:1.0</capability>`);
  lines.push(`  </capabilities>`);
  lines.push(`</hello>`);
  lines.push(`]]>]]>`);
  lines.push(`<rpc message-id="1" xmlns="urn:ietf:params:xml:ns:netconf:base:1.0">`);
  lines.push(`  <edit-config>`);
  lines.push(`    <target><running/></target>`);
  lines.push(`    <config xmlns:xc="urn:ietf:params:xml:ns:netconf:base:1.0">`);
  lines.push(`      <ManagedElement xmlns="urn:com:ericsson:ecim:ComTop">`);
  lines.push(`        <managedElementId>${nodeId}</managedElementId>`);
  lines.push(`        <Equipment xmlns="urn:com:ericsson:ecim:RcsEquipment">`);
  lines.push(`          <equipmentId>1</equipmentId>`);

  const allocated = allocatePorts(state.bands);

  // PART 2: AntennaUnitGroups + RF FRUs
  for (const band of state.bands) {
    const prefix = band.prefix === 'CUSTOM' ? (band.customPrefix || 'CSTM') : band.prefix;
    const eff = getEffectivePreset(band);
    const ports = RF_PORTS[eff.rfType];
    for (let s = 1; s <= band.numSectors; s++) {
      const groupId = `${prefix}_S${s}`;
      const fruId = `${prefix}-${s}-RRUW-1`;
      lines.push(``);
      lines.push(`          <!-- ${prefix} sector ${s} -->`);
      lines.push(`          <AntennaUnitGroup>`);
      lines.push(`            <antennaUnitGroupId>${groupId}</antennaUnitGroupId>`);
      if (eff.hasMechanicalTilt) {
        lines.push(`            <mechanicalAntennaTilt>${band.mechanicalTilt|0}</mechanicalAntennaTilt>`);
      }
      lines.push(`            <AntennaUnit>`);
      lines.push(`              <antennaUnitId>1</antennaUnitId>`);
      lines.push(`              <AntennaSubunit>`);
      lines.push(`                <antennaSubunitId>1</antennaSubunitId>`);
      ports.forEach((p, idx) => {
        lines.push(`                <AuPort><auPortId>${idx+1}</auPortId></AuPort>`);
      });
      lines.push(`              </AntennaSubunit>`);
      lines.push(`            </AntennaUnit>`);
      lines.push(`          </AntennaUnitGroup>`);

      ports.forEach((p, idx) => {
        const isFirst = idx === 0;
        lines.push(`          <FieldReplaceableUnit>`);
        lines.push(`            <fieldReplaceableUnitId>${fruId}</fieldReplaceableUnitId>`);
        if (isFirst) {
          lines.push(`            <administrativeState>UNLOCKED</administrativeState>`);
        }
        lines.push(`            <RfPort>`);
        lines.push(`              <rfPortId>${p}</rfPortId>`);
        lines.push(`              <administrativeState>${eff.rfPortAdminState}</administrativeState>`);
        lines.push(`            </RfPort>`);
        lines.push(`          </FieldReplaceableUnit>`);
        lines.push(`          <AntennaUnitGroup>`);
        lines.push(`            <antennaUnitGroupId>${groupId}</antennaUnitGroupId>`);
        lines.push(`            <RfBranch>`);
        lines.push(`              <rfBranchId>${idx+1}</rfBranchId>`);
        lines.push(`              <auPortRef>${baseRef},AntennaUnitGroup=${groupId},AntennaUnit=1,AntennaSubunit=1,AuPort=${idx+1}</auPortRef>`);
        lines.push(`              <rfPortRef>${baseRef},FieldReplaceableUnit=${fruId},RfPort=${p}</rfPortRef>`);
        lines.push(`            </RfBranch>`);
        lines.push(`          </AntennaUnitGroup>`);
      });
    }
  }

  // PART 3: Cabinet
  lines.push(``);
  lines.push(`          <Cabinet><cabinetId>1</cabinetId></Cabinet>`);

  // PART 4: BBU FRU
  lines.push(``);
  lines.push(`          <FieldReplaceableUnit>`);
  lines.push(`            <fieldReplaceableUnitId>1</fieldReplaceableUnitId>`);
  lines.push(`            <administrativeState>UNLOCKED</administrativeState>`);
  allocated.forEach(a => {
    lines.push(`            <RiPort><riPortId>${a.bbuPort}</riPortId></RiPort>`);
  });
  lines.push(`            <SyncPort><syncPortId>1</syncPortId></SyncPort>`);
  lines.push(`          </FieldReplaceableUnit>`);

  // PART 5: RRU FRUs with DATA ports
  for (const band of state.bands) {
    const prefix = band.prefix === 'CUSTOM' ? (band.customPrefix || 'CSTM') : band.prefix;
    for (let s = 1; s <= band.numSectors; s++) {
      const fruId = `${prefix}-${s}-RRUW-1`;
      lines.push(`          <FieldReplaceableUnit>`);
      lines.push(`            <fieldReplaceableUnitId>${fruId}</fieldReplaceableUnitId>`);
      lines.push(`            <RiPort><riPortId>DATA_1</riPortId></RiPort>`);
      lines.push(`            <RiPort><riPortId>DATA_2</riPortId></RiPort>`);
      lines.push(`          </FieldReplaceableUnit>`);
    }
  }

  // PART 6: RiLinks
  lines.push(``);
  let ai = 0;
  for (const band of state.bands) {
    const prefix = band.prefix === 'CUSTOM' ? (band.customPrefix || 'CSTM') : band.prefix;
    for (let s = 1; s <= band.numSectors; s++) {
      const linkId = `${prefix}_S${s}_1st`;
      const fruId = `${prefix}-${s}-RRUW-1`;
      const bbuPort = allocated[ai]?.bbuPort || '?'; ai++;
      lines.push(`          <RiLink>`);
      lines.push(`            <riLinkId>${linkId}</riLinkId>`);
      lines.push(`            <riPortRef1>${baseRef},FieldReplaceableUnit=1,RiPort=${bbuPort}</riPortRef1>`);
      lines.push(`            <riPortRef2>${baseRef},FieldReplaceableUnit=${fruId},RiPort=DATA_2</riPortRef2>`);
      lines.push(`          </RiLink>`);
    }
  }

  lines.push(`        </Equipment>`);
  lines.push(`        <EquipmentSupportFunction>`);
  lines.push(`          <equipmentSupportFunctionId>1</equipmentSupportFunctionId>`);
  lines.push(`          <supportSystemControl>${state.supportSystemControl ? 'true' : 'false'}</supportSystemControl>`);
  lines.push(`        </EquipmentSupportFunction>`);

  // PART 8: NodeSupport + SectorEquipmentFunctions
  lines.push(`        <NodeSupport xmlns="urn:com:ericsson:ecim:RcsNodeSupport">`);
  lines.push(`          <nodeSupportId>1</nodeSupportId>`);
  lines.push(`          <MpClusterHandling>`);
  lines.push(`            <mpClusterHandlingId>1</mpClusterHandlingId>`);
  lines.push(`            <primaryCoreRef>${baseRef},FieldReplaceableUnit=1</primaryCoreRef>`);
  lines.push(`          </MpClusterHandling>`);
  for (const band of state.bands) {
    const prefix = band.prefix === 'CUSTOM' ? (band.customPrefix || 'CSTM') : band.prefix;
    const eff = getEffectivePreset(band);
    const ports = RF_PORTS[eff.rfType];
    for (let s = 1; s <= band.numSectors; s++) {
      const groupId = `${prefix}_S${s}`;
      lines.push(`          <SectorEquipmentFunction>`);
      lines.push(`            <sectorEquipmentFunctionId>${groupId}</sectorEquipmentFunctionId>`);
      lines.push(`            <administrativeState>${eff.sectorAdminState}</administrativeState>`);
      if (eff.mixedModeRadio) {
        lines.push(`            <mixedModeRadio>true</mixedModeRadio>`);
      }
      ports.forEach((p, idx) => {
        lines.push(`            <rfBranchRef>${baseRef},AntennaUnitGroup=${groupId},RfBranch=${idx+1}</rfBranchRef>`);
      });
      lines.push(`          </SectorEquipmentFunction>`);
    }
  }
  lines.push(`        </NodeSupport>`);
  lines.push(`      </ManagedElement>`);
  lines.push(`    </config>`);
  lines.push(`  </edit-config>`);
  lines.push(`</rpc>`);
  lines.push(`]]>]]>`);
  lines.push(`<rpc message-id="2" xmlns="urn:ietf:params:xml:ns:netconf:base:1.0">`);
  lines.push(`  <close-session/>`);
  lines.push(`</rpc>`);
  lines.push(`]]>]]>`);

  return lines.join('\n');
}

/* ============================== Syntax Highlight ============================== */
function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function highlightXML(xml) {
  // tokenise line-by-line for safety
  return xml.split('\n').map(line => {
    if (line.trim().startsWith('<!--')) return `<span class="comment">${escapeHtml(line)}</span>`;
    if (line.trim() === ']]>]]>') return `<span class="delim">${escapeHtml(line)}</span>`;
    if (line.trim().startsWith('<?xml')) return `<span class="decl">${escapeHtml(line)}</span>`;
    let out = escapeHtml(line);
    // colorize text content between tags first: ">text<" → keep but highlight text
    out = out.replace(/(&gt;)([^&<>]+?)(&lt;)/g, (m, a, txt, b) => {
      if (/^\s*$/.test(txt)) return m;
      return `${a}<span class="text-content">${txt}</span>${b}`;
    });
    // closing tags
    out = out.replace(/(&lt;\/)([A-Za-z_][\w:-]*)(&gt;)/g,
      '<span class="tag-close">$1$2$3</span>');
    // opening tag name + attrs
    out = out.replace(/(&lt;)([A-Za-z_][\w:-]*)([^&]*?)(\/?&gt;)/g,
      (m, lt, name, attrs, gt) => {
        const styledAttrs = attrs.replace(/([\w:-]+)=(&quot;)([^"]*?)(&quot;)/g,
          '<span class="attr">$1</span>=$2<span class="value">$3</span>$4');
        return `<span class="tag-open">${lt}${name}</span>${styledAttrs}<span class="tag-open">${gt}</span>`;
      });
    return out;
  }).join('\n');
}

/* ============================== UI Components ============================== */
function Switch({ on, onChange }) {
  return <div className={`switch ${on ? 'on' : ''}`} role="switch" aria-checked={on} onClick={() => onChange(!on)} />;
}

function Checkbox({ on, onChange, label }) {
  return (
    <div className="checkbox-row" onClick={() => onChange(!on)}>
      <div className={`checkbox ${on ? 'on' : ''}`} />
      <span>{label}</span>
    </div>
  );
}

function Segment({ options, value, onChange, variant }) {
  return (
    <div className={`segment ${variant || ''}`}>
      {options.map(o => (
        <button
          key={o}
          className={`${value === o ? 'active' : ''} ${o.toLowerCase()}`}
          onClick={() => onChange(o)}
        >{o}</button>
      ))}
    </div>
  );
}

function BandCard({ band, onUpdate, onRemove }) {
  const eff = getEffectivePreset(band);
  const sliderPct = ((band.numSectors - 1) / 7) * 100;
  const isCustom = band.prefix === 'CUSTOM';
  return (
    <div className="band-card">
      <div className="band-head">
        <div className="band-title">
          {isCustom ? (
            <input
              className="band-name-input"
              value={band.customPrefix || ''}
              placeholder="prefix"
              onChange={(e) => onUpdate(band.id, { customPrefix: e.target.value.toUpperCase().slice(0,8) })}
            />
          ) : (
            <span className="band-name">{band.prefix}</span>
          )}
          <span className={`badge ${eff.sectorAdminState === 'UNLOCKED' ? 'unlocked' : 'locked'}`}>
            <span className="dot" />{eff.sectorAdminState}
          </span>
          <span className="badge" style={{background:'rgba(37,99,235,0.10)', color:'#1d4ed8'}}>{eff.rfType}</span>
        </div>
        <button className="icon-btn" onClick={() => onRemove(band.id)} aria-label="Remove band">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div className="band-body">
        <div className="row">
          <span className="row-label">Sectors</span>
          <div className="slider-wrap">
            <input
              type="range" min="1" max="8" value={band.numSectors}
              className="slider"
              style={{ '--pct': sliderPct + '%' }}
              onChange={(e) => onUpdate(band.id, { numSectors: +e.target.value })}
            />
            <span className="slider-value">{band.numSectors}</span>
          </div>
        </div>
        <div className="row">
          <span className="row-label">RF Type</span>
          <Segment options={['2T2R','4T4R']} value={eff.rfType}
            onChange={(v) => onUpdate(band.id, { rfTypeOverride: v })} />
        </div>
        <div className="row">
          <span className="row-label">Admin State</span>
          <Segment options={['UNLOCKED','LOCKED']} value={eff.sectorAdminState} variant="state"
            onChange={(v) => onUpdate(band.id, { adminStateOverride: v })} />
        </div>
        <div className="row">
          <Checkbox
            on={eff.mixedModeRadio}
            onChange={(v) => onUpdate(band.id, { mixedModeOverride: v })}
            label="Mixed Mode Radio"
          />
          {eff.hasMechanicalTilt && (
            <div style={{display:'flex', alignItems:'center', gap:6}}>
              <span className="row-label">Tilt</span>
              <input type="number" className="tilt-input" min="0" max="20" value={band.mechanicalTilt}
                onChange={(e) => onUpdate(band.id, { mechanicalTilt: +e.target.value || 0 })}
              />
              <span style={{color:'var(--text-muted)', fontSize:11}}>°</span>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ============================== App ============================== */
let nextId = 100;
function createBand(prefix) {
  return {
    id: ++nextId,
    prefix,
    customPrefix: prefix === 'CUSTOM' ? 'CSTM' : null,
    numSectors: 3,
    rfTypeOverride: null,
    adminStateOverride: null,
    mixedModeOverride: null,
    mechanicalTilt: 0
  };
}

function App() {
  const [activeTab, setActiveTab] = useState('form');
  const [copyOk, setCopyOk] = useState(false);
  const [state, setState] = useState({
    nodeId: '1',
    supportSystemControl: true,
    bands: [
      { id: 1, prefix: '44XX', customPrefix: null, numSectors: 3, rfTypeOverride: null, adminStateOverride: null, mixedModeOverride: null, mechanicalTilt: 0 },
      { id: 2, prefix: '0900', customPrefix: null, numSectors: 3, rfTypeOverride: null, adminStateOverride: null, mixedModeOverride: null, mechanicalTilt: 0 }
    ]
  });

  const totalSectors = state.bands.reduce((a,b) => a + b.numSectors, 0);
  const overflow = totalSectors > PORT_SEQUENCE.length;

  const updateBand = (id, changes) => {
    setState(s => ({ ...s, bands: s.bands.map(b => b.id === id ? { ...b, ...changes } : b) }));
  };
  const removeBand = (id) => {
    setState(s => ({ ...s, bands: s.bands.filter(b => b.id !== id) }));
  };
  const addBand = (prefix) => {
    setState(s => ({ ...s, bands: [...s.bands, createBand(prefix)] }));
  };

  const xml = useMemo(() => generateXML(state), [state]);
  const lineCount = useMemo(() => xml.split('\n').length, [xml]);
  const highlighted = useMemo(() => highlightXML(xml), [xml]);
  const lineNumbers = useMemo(() => Array.from({length: lineCount}, (_,i) => i+1).join('\n'), [lineCount]);

  const onCopy = async () => {
    try { await navigator.clipboard.writeText(xml); } catch {}
    setCopyOk(true);
    setTimeout(() => setCopyOk(false), 1800);
  };
  const onDownload = () => {
    const blob = new Blob([xml], { type: 'application/xml' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `SiteEquipment_${state.nodeId}.xml`;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
  };

  return (
    <div className="app">
      <div className="topbar">
        <div className="brand">
          <div className="brand-mark">EEC</div>
          <div>
            <div className="brand-title">Equipment Configurator</div>
            <div className="brand-sub">NETCONF · v1.0</div>
          </div>
        </div>
        <div className="topbar-actions">
          <span className="status-pill"><span className="dot" />Offline ready</span>
          <button className="lang-btn">EN</button>
        </div>
      </div>

      <div className="tabs">
        <button className={`tab ${activeTab === 'form' ? 'active' : ''}`} onClick={() => setActiveTab('form')}>Form</button>
        <button className={`tab ${activeTab === 'preview' ? 'active' : ''}`} onClick={() => setActiveTab('preview')}>Preview</button>
      </div>

      <div className="layout">
        <div className={`pane-form ${activeTab === 'form' ? 'active' : ''}`}>
          <div className="form-scroll">
            <div className="section-label"><span>Node settings</span></div>
            <div className="node-card">
              <div className="field">
                <div>
                  <div className="field-label">Node ID</div>
                  <div className="field-help">managedElementId &amp; equipmentId</div>
                </div>
                <input
                  className="text-input"
                  value={state.nodeId}
                  onChange={(e) => setState(s => ({ ...s, nodeId: e.target.value }))}
                />
              </div>
              <div className="field">
                <div>
                  <div className="field-label">Support System Control</div>
                  <div className="field-help">EquipmentSupportFunction flag</div>
                </div>
                <Switch on={state.supportSystemControl}
                  onChange={(v) => setState(s => ({ ...s, supportSystemControl: v }))} />
              </div>
            </div>

            <div className="section-label">
              <span>Bands</span>
              <span className="count">{state.bands.length} bands · {totalSectors} sector{totalSectors!==1?'s':''}</span>
            </div>

            <div className="band-list">
              {state.bands.map(b => (
                <BandCard key={b.id} band={b} onUpdate={updateBand} onRemove={removeBand} />
              ))}
            </div>

            {overflow && (
              <div className="warning-banner">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                <span>Total sectors exceed {PORT_SEQUENCE.length} — BBU port sequence is limited.</span>
              </div>
            )}

            <div className="add-section">
              <div className="section-label"><span>Add band</span></div>
              <div className="add-grid">
                {PRESET_KEYS.map(p => (
                  <button key={p} className="add-btn" onClick={() => addBand(p)}>
                    <span className="plus">+</span>{p}
                  </button>
                ))}
                <button className="add-btn custom" onClick={() => addBand('CUSTOM')}>
                  <span className="plus">+</span>Custom band
                </button>
              </div>
            </div>
          </div>
        </div>

        <div className={`pane-preview ${activeTab === 'preview' ? 'active' : ''}`}>
          <div className="preview-header">
            <div className="preview-file">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1d4ed8" strokeWidth="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
              <span className="filename">SiteEquipment_{state.nodeId}.xml</span>
            </div>
            <div className="preview-meta">
              <span>lines<strong>{lineCount}</strong></span>
              <span>bytes<strong>{xml.length.toLocaleString()}</strong></span>
            </div>
          </div>

          <div className="preview-body">
            <div className="gutter">{lineNumbers}</div>
            <pre className="code" dangerouslySetInnerHTML={{__html: highlighted}} />
          </div>

          <div className="preview-footer">
            <button className="btn btn-secondary" onClick={onCopy}>
              {copyOk ? (
                <><span className="ok">✓</span><span className="ok">Copied</span></>
              ) : (
                <><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>Copy XML</>
              )}
            </button>
            <button className="btn btn-primary" onClick={onDownload}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              Download .xml
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
