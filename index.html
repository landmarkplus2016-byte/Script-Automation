<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Generate Ericsson NETCONF XML equipment configuration scripts for base station sites">
  <meta name="theme-color" content="#006fee">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="EEC">
  <title>Ericsson Equipment Configurator</title>

  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="assets/icon-192.png">
  <link rel="apple-touch-icon" href="assets/icon-192.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/form.css">
  <link rel="stylesheet" href="css/preview.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>

  <div class="app">

    <!-- Top bar -->
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">EEC</div>
        <div>
          <div class="brand-title">Equipment Configurator</div>
          <div class="brand-sub">NETCONF · v1.0</div>
        </div>
      </div>
      <div class="topbar-actions">
        <span class="chip"><span class="dot"></span>Offline ready</span>
        <button class="lang-btn">EN</button>
        <img src="LMP Big Logo-Photoroom.png" alt="Landmark Plus" class="topbar-logo">
      </div>
    </header>

    <!-- Main layout -->
    <div class="layout">

      <!-- Mobile tab switcher (hidden on desktop) -->
      <div class="tabs" id="tab-switcher">
        <button class="tab active" data-tab="form">Form</button>
        <button class="tab" data-tab="preview">Preview</button>
      </div>

      <!-- Form panel -->
      <div class="pane-form active" id="pane-form">
        <div class="form-scroll">

          <p class="section-label">Node settings</p>
          <div class="node-card">
            <div class="field">
              <div>
                <div class="field-label">Node ID</div>
                <div class="field-help">managedElementId &amp; equipmentId</div>
              </div>
              <input type="text" id="node-id" class="text-input" value="1" autocomplete="off" spellcheck="false">
            </div>
            <div class="field">
              <div>
                <div class="field-label">Support System Control</div>
                <div class="field-help">EquipmentSupportFunction flag</div>
              </div>
              <div id="support-system-control" class="switch" role="switch" aria-checked="false"></div>
            </div>
          </div>

          <p class="section-label">
            <span>Bands</span>
            <span class="section-count" id="bands-count"></span>
          </p>
          <div id="band-list" class="band-list"></div>

          <div class="warning-banner" id="overflow-warning">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
              <line x1="12" y1="9" x2="12" y2="13"/>
              <line x1="12" y1="17" x2="12.01" y2="17"/>
            </svg>
            <span>Total sectors exceed 24 — BBU port sequence is limited.</span>
          </div>

          <div class="add-section">
            <p class="section-label">Add band</p>
            <div class="add-grid">
              <button id="btn-add-44XX" class="add-btn"><span class="plus">+</span><span>44XX</span></button>
              <button id="btn-add-0900" class="add-btn"><span class="plus">+</span><span>0900</span></button>
              <button id="btn-add-1800" class="add-btn"><span class="plus">+</span><span>1800</span></button>
              <button id="btn-add-2100" class="add-btn"><span class="plus">+</span><span>2100</span></button>
              <button id="btn-add-2600" class="add-btn"><span class="plus">+</span><span>2600</span></button>
              <button id="btn-add-CUSTOM" class="add-btn add-btn--custom"><span class="plus">+</span><span>Custom band</span></button>
            </div>
          </div>

        </div>
      </div>

      <!-- Preview panel -->
      <div class="pane-preview" id="pane-preview">
        <div class="preview-header">
          <div class="preview-file">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
            </svg>
            <span class="filename" id="preview-filename">SiteEquipment_1.xml</span>
          </div>
          <div class="preview-meta">
            <span class="meta-chip">lines&#160;<strong id="preview-linecount">0</strong></span>
            <span class="meta-chip">bytes&#160;<strong id="preview-bytes">0</strong></span>
          </div>
        </div>
        <div class="preview-body">
          <div class="gutter" id="xml-gutter"></div>
          <pre class="code" id="xml-output"></pre>
        </div>
        <div class="preview-footer">
          <button class="btn btn-secondary" id="preview-btn-copy">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2"/>
              <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
            </svg>
            Copy XML
          </button>
          <button class="btn btn-primary" id="preview-btn-download">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            Download .xml
          </button>
        </div>
      </div>

    </div>
  </div>

  <script type="module" src="js/config.js"></script>
  <script type="module" src="js/generator.js"></script>
  <script type="module" src="js/ui.js"></script>
  <script type="module" src="js/download.js"></script>
  <script type="module" src="js/app.js"></script>

</body>
</html>
