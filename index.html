<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Generate Ericsson NETCONF XML equipment configuration scripts for base station sites">
  <meta name="theme-color" content="#1d4ed8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="EEC">
  <title>Ericsson Equipment Configurator</title>

  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="assets/icon-192.png">
  <link rel="apple-touch-icon" href="assets/icon-192.png">

  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/form.css">
  <link rel="stylesheet" href="css/preview.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>

  <div id="tab-switcher">
    <button class="tab-btn tab-btn--active" data-tab="configure">Configure</button>
    <button class="tab-btn" data-tab="preview">Preview</button>
  </div>

  <main id="app">

    <section id="form-panel" class="panel">
      <header id="form-header" class="panel-header">
        <div class="header-brand">
          <span class="header-logo">◈ EEC</span>
          <div class="header-titles">
            <div class="header-name">Equipment Configurator</div>
            <div class="header-sub">NETCONF XML · Ericsson RBS</div>
          </div>
        </div>
      </header>

      <div id="form-content" class="panel-body">
        <section class="form-section">
          <span class="section-label">Node Settings</span>
          <div class="field-row">
            <label class="field-label" for="node-id">Node ID</label>
            <input type="text" id="node-id" class="input-text input-text--full" value="1" autocomplete="off" spellcheck="false">
          </div>
          <div class="field-row">
            <label class="field-label" for="support-system-control">Support Sys.</label>
            <label class="checkbox-label">
              <input type="checkbox" id="support-system-control" class="checkbox">
              <span>Support System Control</span>
            </label>
          </div>
        </section>

        <section class="form-section">
          <span class="section-label">Bands</span>
          <div id="band-list" class="band-list"></div>
          <div class="add-band-group">
            <button id="btn-add-44XX"   class="btn-add">44XX</button>
            <button id="btn-add-0900"   class="btn-add">0900</button>
            <button id="btn-add-1800"   class="btn-add">1800</button>
            <button id="btn-add-2100"   class="btn-add">2100</button>
            <button id="btn-add-CUSTOM" class="btn-add btn-add--ghost">+ Custom</button>
          </div>
        </section>
      </div>

      <footer id="form-footer" class="panel-footer">
        <button id="btn-copy"     class="btn-action">Copy XML</button>
        <button id="btn-download" class="btn-action btn-action--primary">&#8595; Download</button>
      </footer>
    </section>

    <section id="preview-panel" class="panel">
      <header id="preview-header" class="panel-header">
        <span id="preview-filename"></span>
        <span id="preview-linecount"></span>
      </header>
      <pre id="xml-output"></pre>
      <footer id="preview-footer" class="panel-footer">
        <button id="preview-btn-copy"     class="btn-action">Copy XML</button>
        <button id="preview-btn-download" class="btn-action btn-action--primary">&#8595; Download</button>
      </footer>
    </section>

  </main>

  <script type="module" src="js/config.js"></script>
  <script type="module" src="js/generator.js"></script>
  <script type="module" src="js/ui.js"></script>
  <script type="module" src="js/download.js"></script>
  <script type="module" src="js/app.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      document.addEventListener('DOMContentLoaded', () => {
        navigator.serviceWorker.register('./sw.js');
      });
    }
  </script>

</body>
</html>
