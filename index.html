<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Generate Ericsson NETCONF XML equipment configuration scripts for base station sites">
  <meta name="theme-color" content="#1d4ed8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="EEC">
  <title>Ericsson Equipment Configurator</title>

  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="assets/icon-192.png">
  <link rel="apple-touch-icon" href="assets/icon-192.png">

  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/form.css">
  <link rel="stylesheet" href="css/preview.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>

  <div id="tab-switcher">
    <button class="tab-btn tab-btn--active" data-tab="configure">Configure</button>
    <button class="tab-btn" data-tab="preview">Preview</button>
  </div>

  <main id="app">

    <section id="form-panel" class="panel">
      <header id="form-header" class="panel-header"></header>
      <div id="form-content" class="panel-body"></div>
      <footer id="form-footer" class="panel-footer"></footer>
    </section>

    <section id="preview-panel" class="panel">
      <header id="preview-header" class="panel-header">
        <span id="preview-filename"></span>
        <span id="preview-linecount"></span>
      </header>
      <pre id="xml-output"></pre>
    </section>

  </main>

  <script type="module" src="js/config.js"></script>
  <script type="module" src="js/generator.js"></script>
  <script type="module" src="js/ui.js"></script>
  <script type="module" src="js/download.js"></script>
  <script type="module" src="js/app.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      document.addEventListener('DOMContentLoaded', () => {
        navigator.serviceWorker.register('./sw.js');
      });
    }
  </script>

</body>
</html>
